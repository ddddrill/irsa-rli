name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "numpy<2" "scipy<1.12" "matplotlib<3.9" "pyinstaller==5.13.2" "setuptools<71"

      - name: Build with PyInstaller
        run: pyinstaller IRSA.spec --noconfirm

      - name: Create zip archive
        run: Compress-Archive -Path dist\IRSA -DestinationPath IRSA_${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: IRSA_${{ github.ref_name }}.zip
          generate_release_notes: true
